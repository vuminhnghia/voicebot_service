# Memory threshold — throttle publishers khi RAM vượt 40% tổng
vm_memory_high_watermark.relative = 0.4

# Disk free limit — block publish khi disk còn dưới 1GB
disk_free_limit.absolute = 1GB

# Log level (console output)
log.console.level = info

# Heartbeat (seconds) — detect dead connections
heartbeat = 60
