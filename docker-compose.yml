services:
  triton:
    build: ./services/triton
    image: voicebot-triton:latest
    container_name: voicebot-triton
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    shm_size: 1g
    ports:
      - "8000:8000"   # HTTP (debug)
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    volumes:
      - ./services/triton/parakeet_asr:/model_repo/parakeet_asr
      - ./services/triton/mms_tts:/model_repo/mms_tts
      - ./services/triton/qwen35_llm:/model_repo/qwen35_llm
      - ./opt/models/parakeet_asr:/opt/models/parakeet_asr
      - ./opt/models/mms_tts_vie:/opt/models/mms_tts_vie
      - ${HOME}/.cache/huggingface:/opt/models/hf_cache
    command: tritonserver --model-repository=/model_repo

  postgres:
    image: postgres:16-alpine
    container_name: voicebot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: voicebot
      POSTGRES_USER: voicebot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voicebot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicebot"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: voicebot-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: voicebot
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-voicebot}
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
      - "15692:15692"   # Prometheus metrics
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voicebot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    container_name: voicebot-seaweedfs
    restart: unless-stopped
    command: server -s3 -dir=/data -ip=seaweedfs -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json
    ports:
      - "9333:9333"   # Master (admin)
      - "8333:8333"   # S3 API
    volumes:
      - seaweedfs_data:/data
      - ./infra/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8333/"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: voicebot-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./services/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    entrypoint: ["/app/entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: voicebot-worker
    restart: unless-stopped
    env_file:
      - ./services/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_started
      triton:
        condition: service_started
    entrypoint: ["/app/entrypoint.sh"]
    command: ["python", "-m", "app.worker.main"]

  prometheus:
    image: prom/prometheus:latest
    container_name: voicebot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    mem_limit: 256m

  loki:
    image: grafana/loki:latest
    container_name: voicebot-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    mem_limit: 256m

  promtail:
    image: grafana/promtail:latest
    container_name: voicebot-promtail
    restart: unless-stopped
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    mem_limit: 128m

  grafana:
    image: grafana/grafana:latest
    container_name: voicebot-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    mem_limit: 256m

volumes:
  postgres_data:
  rabbitmq_data:
  seaweedfs_data:
  prometheus_data:
  loki_data:
  grafana_data:
